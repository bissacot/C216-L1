version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres_alunos
    environment:
      POSTGRES_DB: alunos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: gerenciador_alunos
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/alunos_db

volumes:
  postgres_data: